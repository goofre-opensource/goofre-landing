<head>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        goofre: '#5B249A',
                        bg: '#0A0A0B',
                        pane: '#121214',
                        bordercolor: '#27272A',
                        muted: '#A1A1AA',
                        bodytext: '#E4E4E7',
                        googlered: '#EA4335',
                        googlegreen: '#34A853',
                        googleblue: '#4285F4'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']

                }
            }
        }

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272A;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        /* Utility to hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0B;
            color: #E4E4E7;
            margin: 0;
            overflow: hidden;
            /* Lock the viewport */
        }

        .tab-button {
            transition: all 0.2s ease-in-out;
        }

        /* Active Tab Formatting */
        .tab-button.active {
            background-color: #27272A;
            color: #FFFFFF;
        }

        .tab-button.active-alert {
            background-color: #27272A;
            color: #FFFFFF;
        }

        .content-fade {
            transition: opacity 300ms ease-in-out;
        }

        /* Typography Formatting in Content Pane */
        .prose h2 {
            color: #FFFFFF;
            font-size: 1.75rem;
            /* mobile first */
            line-height: 2.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        @media (min-width: 768px) {
            .prose h2 {
                font-size: 2.25rem;
                line-height: 2.5rem;
            }
        }

        .prose p {
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .prose ul {
            list-style: none;
            padding: 0;
        }

        .prose li {
            margin-bottom: 1rem;
        }
    </style>
</head>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

        <!-- Sidebar Navigation -->
        <aside
            class="w-full md:w-[30%] md:min-w-[320px] md:max-w-[400px] border-b md:border-b-0 md:border-r border-bordercolor bg-bg flex flex-col overflow-hidden relative flex-shrink-0">
            <nav id="tabs-container"
                class="flex flex-row md:flex-col overflow-x-auto md:overflow-y-auto no-scrollbar gap-1 z-10 relative px-2 py-2 md:py-6 md:px-4 w-full h-auto md:h-full items-center md:items-stretch">
                <!-- Tabs injected by JS -->
            </nav>
            <div
                class="hidden md:block absolute bottom-6 left-0 right-0 text-center opacity-30 text-xs font-mono pointer-events-none">
            </div>
        </aside>

        <!-- Content Pane -->
        <section class="flex-1 bg-pane relative flex flex-col min-w-0">

            <!-- Breadcrumb Area / Top Padding -->
            <div class="hidden md:flex h-12 w-full flex-shrink-0 items-end px-12 md:px-16 pt-8">
                <div class="inline-flex items-center gap-3">
                    <i data-lucide="terminal" class="w-4 h-4 text-muted"></i>
                    <span id="breadcrumb-text" class="text-xs font-mono text-muted tracking-widest uppercase">Tab
                        01</span>
                    <div class="h-px w-12 bg-bordercolor"></div>
                </div>
            </div>

            <!-- Scrollable Content Container -->
            <div id="content-container"
                class="p-6 md:p-12 lg:p-16 pb-32 flex-1 overflow-y-auto content-fade opacity-0 text-[17px] md:text-lg leading-relaxed tracking-wide prose prose-invert max-w-none md:max-w-[850px]">

                    class="w-full md:w-auto bg-goofre hover:bg-[#7b2cbf] text-white font-medium py-3.5 px-6 rounded flex items-center justify-center gap-3 transition-all duration-200 shadow-[0_0_20px_rgba(98,0,234,0.25)] hover:shadow-[0_0_35px_rgba(98,0,234,0.45)] border border-[#7b2cbf]/30">

                    <span class="tracking-wide">Fork on GitHub</span>
                </a>

    </main>

    <script>
        // --- 1. The Content Payload ---
        const tabsData = [
            {
                id: 1,
                title: "What is Goofre OS?",
                h2: "The Open-Source Core for Agentic Commerce",
                body: `
                    <p class="text-xl leading-relaxed text-bodytext/90">Goofre OS is the foundational infrastructure for the world's first <strong class="text-white font-semibold">Agentic Commerce Orchestrator (ACO)™</strong>.</p>
                    <p class="text-bodytext/80">It is built to replace rigid legacy integrations with intelligent, event-driven orchestration.</p>
                `
            },
            {
                id: 2,
                title: "What is Agentic Commerce?",
                h2: "The End of the Passive Storefront",
                body: `
                    <p>The traditional digital storefront is dying. E-commerce is transitioning into a conversational model where transactions happen natively inside AI agents like <span class="text-googleblue font-mono text-[15px] px-1.5 py-0.5 bg-googleblue/10 rounded">Gemini</span>, <span class="text-white font-mono text-[15px] px-1.5 py-0.5 bg-white/10 rounded">ChatGPT</span>, and Voice.</p>
                    <p>Shopping is no longer about browsing catalogs; it's about dynamic, intent-driven conversations.</p>
                `
            },
            {
                id: 3,
                title: "Is it really happening?",
                h2: "The Data Cannot Be Ignored",
                body: `
                    <p class="text-muted mb-8 font-mono text-sm tracking-wide">The shift is aggressive and accelerating:</p>
                    <ul class="space-y-6">
                        <li class="flex items-start gap-5">
                            <div class="mt-1 p-2 bg-googlegreen/10 rounded-md border border-googlegreen/20"><i data-lucide="trending-up" class="w-5 h-5 text-googlegreen flex-shrink-0"></i></div>
                            <div>
                                <strong class="text-white block text-xl md:text-2xl font-bold tracking-tight mb-1">$290 Billion</strong>
                                <span class="text-bodytext text-base">Projected value of conversational commerce by 2025.</span>
                            </div>
                        </li>
                        <li class="flex items-start gap-5">
                            <div class="mt-1 p-2 bg-googlegreen/10 rounded-md border border-googlegreen/20"><i data-lucide="zap" class="w-5 h-5 text-googlegreen flex-shrink-0"></i></div>
                            <div>
                                <strong class="text-white block text-xl md:text-2xl font-bold tracking-tight mb-1">4,700% Growth</strong>
                                <span class="text-bodytext text-base">YoY increase in AI-driven traffic to retail sites.</span>
                            </div>
                        </li>
                        <li class="flex items-start gap-5">
                            <div class="mt-1 p-2 bg-googlegreen/10 rounded-md border border-googlegreen/20"><i data-lucide="bot" class="w-5 h-5 text-googlegreen flex-shrink-0"></i></div>
                            <div>
                                <strong class="text-white block text-xl md:text-2xl font-bold tracking-tight mb-1">85% of Interactions</strong>
                                <span class="text-bodytext text-base">Will be handled by AI by the end of the year.</span>
                            </div>
                        </li>
                    </ul>
                `
            },
            {
                id: 4,
                title: "Platform Evolution",
                h2: "Platforms are Automating You Away",
                body: `
                    <p>Legacy and AI-native e-commerce platforms are rapidly building AI directly into their core to automate store building and optimization.</p>
                    <p>Merchants can now deploy apps with simple text prompts. As a result, platform partner programs and agency teams are being aggressively downsized.</p>
                `
            },
            {
                id: 5,
                title: "What is UCP?",
                h2: "The Universal Commerce Protocol",
                body: `
                    <p>UCP is the framework dictating how automated shopping operates. It is led by Google's massive consumer moat (<span class="text-googleblue font-medium">Search, Chrome, Gemini</span>) and backed by mammoth business engines (<span class="text-googlegreen font-medium">GMC, Analytics, Ads</span>).</p>
                    <p>However, the Google stack is complex, multi-featured, and highly siloed.</p>
                `
            },
            {
                id: 6,
                title: "🚨 Dev Reality Check",
                h2: "Your Role is Obsolete (If You Don't Adapt)",
                isAlert: true,
                body: `
                    <div class="border-l-[3px] border-googlered pl-4 py-4 my-8 bg-googlered/5 rounded-r-lg md:pl-6">
                        <p class="text-bodytext/90 mb-6 text-[15px] md:text-[17px]">Store designing is now being done directly by merchants using AI-generation tools like <span class="font-mono text-white text-[14px] md:text-[15px]">Lovable</span> and <span class="font-mono text-white text-[14px] md:text-[15px]">Replit</span>. Store building and day-to-day management are being entirely automated.</p>
                        <p class="text-googlered font-bold text-lg md:text-[22px] tracking-tight leading-snug"><i data-lucide="triangle-alert" class="w-5 h-5 md:w-6 md:h-6 inline-block -mt-1 mr-2"></i>If platforms are autonomous and storefronts are chat windows, what is your job?</p>
                    </div>
                `
            },
            {
                id: 7,
                title: "The Solution",
                h2: "Become an Agentic Commerce Orchestrator™",
                body: `
                    <p>You are no longer a store builder; you are the critical <strong class="text-white bg-white/10 px-2 py-0.5 rounded">human-in-the-loop</strong>.</p>
                    <p>Goofre OS is the open-source brain and nervous system that seamlessly connects Google Merchant Center (GMC) with the rest of Google's commerce-centric stack, dramatically accelerating UCP adoption for your clients without vendor lock-in.</p>
                `
            },
            {
                id: 8,
                title: "How it Works",
                h2: "Deploy. Monitor. Orchestrate.",
                body: `
                    <div class="mb-10">
                        <ol class="space-y-4 list-decimal list-inside text-bodytext font-mono text-[15px] bg-[#161618] p-8 rounded-xl border border-bordercolor shadow-inner">
                            <li class="pl-2"><strong class="text-white">Fork</strong> the Goofre OS repo.</li>
                            <li class="pl-2"><strong class="text-white">Connect</strong> your merchant's Google keys.</li>
                            <li class="pl-2"><strong class="text-white">Webhook</strong> the legacy site (one-way sync).</li>
                            <li class="pl-2"><strong class="text-white">Sync</strong> physical PoS.</li>
                        </ol>
                    </div>
                `
            }
        ];

        // --- 2. State & DOM Nodes ---
        let activeTabId = 1;
        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('content-container');
        const breadcrumbText = document.getElementById('breadcrumb-text');

        // --- 3. Render Functions ---
        function renderTabs() {
            const scrollContainer = tabsContainer.parentElement;
            const currentScroll = scrollContainer.scrollLeft;

            tabsContainer.innerHTML = '';
            let activeBtn = null;

            tabsData.forEach(tab => {
                const btn = document.createElement('button');
                const isActive = tab.id === activeTabId;
                if (isActive) activeBtn = btn;

                // Base classes
                let classes = "tab-button !flex w-auto md:w-full flex-shrink-0 text-left px-3 py-2 md:px-5 md:py-4 rounded-md md:rounded-lg font-medium text-[13px] md:text-[15px] items-center justify-center md:justify-between group outline-none focus:outline-none border-b-2 md:border-b-0 md:border-l-2 border-transparent ";

                if (isActive) {
                    if (tab.isAlert) {
                        classes += "active-alert bg-zinc-800/60 md:bg-zinc-800 text-white shadow-none md:shadow-sm !border-googlered md:!border-l-googlered md:!border-b-transparent";
                    } else {
                        classes += "active bg-zinc-800/60 md:bg-zinc-800 text-white shadow-none md:shadow-sm !border-goofre md:!border-l-goofre md:!border-b-transparent";
                    }
                } else {
                    if (tab.isAlert) {
                        classes += "text-googlered/60 hover:bg-zinc-800/30 hover:text-googlered";
                    } else {
                        classes += "text-muted hover:bg-zinc-800/30 hover:text-bodytext";
                    }
                }

                btn.className = classes;
                btn.innerHTML = `
                    <span class="tracking-wide flex items-center gap-2 md:gap-3 whitespace-nowrap">
                        ${tab.isAlert && isActive ? '<i data-lucide="triangle-alert" class="w-4 h-4 text-googlered"></i>' : ''}
                        ${!tab.isAlert && isActive ? '<i data-lucide="terminal-square" class="w-4 h-4 text-goofre"></i>' : ''}
                        ${tab.title}
                    </span>
                    <i data-lucide="chevron-right" class="hidden md:block w-4 h-4 opacity-${isActive ? '100' : '0'} group-hover:opacity-100 transition-opacity ${isActive ? (tab.isAlert ? 'text-googlered' : 'text-goofre') : 'text-muted/50'}"></i>
                `;

                btn.onclick = () => {
                    if (activeTabId !== tab.id) {
                        activeTabId = tab.id;
                        updateUI();
                    }
                };

                tabsContainer.appendChild(btn);
            });

            // Re-initialize icons for newly injected DOM
            lucide.createIcons();

            // Restore scroll position to prevent snapping to left
            scrollContainer.scrollLeft = currentScroll;

            // Auto-scroll to center the active tab completely in view
            if (activeBtn) {
                setTimeout(() => {
                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }, 10);
            }
        }

        function renderContent() {
            const tab = tabsData.find(t => t.id === activeTabId);
            if (!tab) return;

            // Trigger Fade Out
            contentContainer.classList.remove('opacity-100');
            contentContainer.classList.add('opacity-0');

            // Update Breadcrumb instantly
            breadcrumbText.innerText = `Tab 0${tab.id}`;

            if (tab.isAlert) {
                breadcrumbText.classList.add('text-googlered');
                breadcrumbText.classList.remove('text-muted');
            } else {
                breadcrumbText.classList.add('text-muted');
                breadcrumbText.classList.remove('text-googlered');
            }

            // Wait for fade out to complete before swapping content
            setTimeout(() => {
                let h2ColorClass = tab.isAlert ? "text-googlered" : "text-white";

                contentContainer.innerHTML = `
                    <h2 class="${h2ColorClass}">${tab.h2}</h2>
                    ${tab.body}
                `;

                lucide.createIcons();

                // Trigger Fade In
                requestAnimationFrame(() => {
                    contentContainer.classList.remove('opacity-0');
                    contentContainer.classList.add('opacity-100');
                });

            }, 300); // 300ms matches the CSS transition duration
        }

        function updateUI() {
            renderTabs();
            renderContent();
        }

        // --- 4. Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
        });
    </script>
</body>
